---
# Ansible playbook for btdig-torznab installation on Debian/Ubuntu
# Installs the Python service, creates system user, and manages systemd unit

- name: Install and configure btdig-torznab
  hosts: btdig-torznab
  become: true

  vars:
    BTDIG_HOST: "0.0.0.0"
    BTDIG_PORT: "5555"
    BTDIG_CACHE_TTL: "300"

  handlers:
    - name: Restart btdig-torznab
      ansible.builtin.systemd:
        name: btdig-torznab
        state: restarted
        daemon_reload: true

  tasks:
    - name: Install python3
      ansible.builtin.apt:
        name: python3
        state: present
        update_cache: true
      tags: install

    - name: Create btdig-torznab system user
      ansible.builtin.user:
        name: btdig-torznab
        system: true
        group: btdig-torznab
        create_home: false
        shell: /usr/sbin/nologin
      tags: install

    - name: Create /opt/btdig-torznab directory
      ansible.builtin.file:
        path: /opt/btdig-torznab
        state: directory
        owner: btdig-torznab
        group: btdig-torznab
        mode: "0755"
      tags: install

    - name: Copy btdig_torznab.py to /opt/btdig-torznab/
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../btdig_torznab.py"
        dest: /opt/btdig-torznab/btdig_torznab.py
        owner: btdig-torznab
        group: btdig-torznab
        mode: "0755"
      tags: install

    - name: Install systemd unit file
      ansible.builtin.template:
        src: btdig-torznab.service.j2
        dest: /etc/systemd/system/btdig-torznab.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart btdig-torznab
      tags: config

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
      tags: service

    - name: Enable and start btdig-torznab service
      ansible.builtin.systemd:
        name: btdig-torznab
        enabled: true
        state: started
      tags: service

    - name: Verify btdig-torznab is active
      ansible.builtin.systemd:
        name: btdig-torznab
      register: btdig_service_status
      failed_when: btdig_service_status.status.ActiveState != "active"
      tags: service
